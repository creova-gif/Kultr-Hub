kind = "mobile"
previewPath = "/"
title = "Kultr"
version = "1.0.0"
id = "artifacts/kultr-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21285

[services.development]
run = "pnpm --filter @workspace/kultr-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kultr-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kultr-mobile", "run", "serve" ]

[services.env]
PORT = "21285"
BASE_PATH = "/"
